name: CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - release/*

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # The @microsoft/agents-hosting-directline-namedpipes workspace declares
      # "os": ["win32"] because the named-pipe transport only works on Windows.
      # On Linux runners `npm ci` would fail with EBADPLATFORM for that workspace,
      # so we pass --force to install it anyway. The package's runtime guard
      # (assertWindowsPlatform) still prevents execution on non-Windows hosts, and
      # its tests are platform-skipped accordingly. The windows-latest matrix leg
      # exercises the Windows-only code paths end-to-end.
      - name: Install dependencies with CI
        run: npm ci --force

      - name: Lint codebase
        run: npm run lint

      - name: Validate unused dependencies, exports, and files
        run: npm run lint:deps:ci

      - name: Build TS
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Build samples
        run: npm run build:samples

      - name: Set Version
        run: node setVersion.js

      - name: Publish Test Report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Node Tests 
          path: test-report.xml
          reporter: java-junit

